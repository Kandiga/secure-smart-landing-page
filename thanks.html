<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Secure Smart — Request received</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:oklch(97.4% 0.006 247);--surface:oklch(99.1% 0.004 247);--ink:oklch(24% 0.028 252);--muted:oklch(40% 0.028 250);--line:oklch(88% 0.012 247);--brand:oklch(46% 0.14 250)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);font-family:Assistant,Inter,system-ui,sans-serif}.card{width:min(560px,calc(100% - 32px));background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:32px;box-shadow:0 18px 46px oklch(24% 0.028 252 / .12)}h1{font-size:30px;margin:0 0 10px}p{color:var(--muted);line-height:1.65;margin:0 0 22px}.btn{display:inline-flex;border-radius:7px;background:var(--brand);color:white;text-decoration:none;font-weight:700;padding:11px 15px}.ltr{direction:ltr;font-family:Inter,system-ui,sans-serif}
  </style>
</head>
<body>
  <main class="card">
    <h1>הבקשה התקבלה</h1>
    <p>תודה. פרטי הגישה או הצעת המחיר יישלחו לאחר בדיקת החשבון.</p>
    <a class="btn" href="/">חזרה ל־<span class="ltr">Secure Smart</span></a>
  </main>
</body>
</html>
