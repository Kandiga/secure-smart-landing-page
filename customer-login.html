<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer Login | Secure Smart</title>
  <meta name="description" content="Secure Smart customer login for approved trade-account customers.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://securesmart.tech/customer-login.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Secure Smart">
  <meta property="og:title" content="Customer Login | Secure Smart">
  <meta property="og:description" content="Secure Smart customer login for approved trade-account customers.">
  <meta property="og:url" content="https://securesmart.tech/customer-login.html">
  <meta property="og:image" content="https://securesmart.tech/assets/brand/secure-smart-logo-header.webp">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/brand/secure-smart-favicon.png" rel="icon" type="image/png" />
  <link href="assets/site.css?v=20260517-header-cart-right" rel="stylesheet" />
  <style>
    .portal-page{min-height:100vh;background:#f2f6f9;padding:32px 16px;display:grid;place-items:center}.portal-card{width:min(560px,100%);background:#fbfdfe;border:1px solid #d7e1e7;border-radius:10px;box-shadow:0 18px 44px rgba(18,41,56,.1);overflow:hidden}.portal-head{padding:22px;border-bottom:1px solid #d7e1e7}.portal-head img{width:210px;max-width:70%;display:block;margin:0 0 18px auto}.portal-head h1{margin:0;font-size:clamp(28px,5vw,40px);line-height:1.08;color:#122938}.portal-head p{margin:8px 0 0;color:#647684}.portal-form{display:grid;gap:14px;padding:22px}.portal-form label{display:grid;gap:6px;font-weight:800;color:#122938}.portal-field{display:grid;gap:6px}.portal-password-wrap{display:flex;align-items:center;border:1px solid #d7e1e7;border-radius:7px;background:white;overflow:hidden}.portal-form input{padding:13px;border:1px solid #d7e1e7;border-radius:7px;background:white;direction:ltr;text-align:left}.portal-password-wrap input{border:0;border-radius:0;flex:1;min-width:0}.portal-password-wrap input:focus{outline:0}.portal-password-toggle{border:0!important;border-left:1px solid #d7e1e7!important;border-radius:0!important;background:#eef6fa!important;color:#02496f!important;padding:13px 14px!important;font-weight:900!important;white-space:nowrap}.portal-form button,.portal-actions a{border:0;border-radius:7px;background:#075f8f;color:#fff;padding:12px 16px;font-weight:900;cursor:pointer;text-align:center}.portal-actions{display:flex;gap:10px;flex-wrap:wrap;padding:0 22px 22px}.portal-actions a.secondary{background:#e7f3f9;color:#02496f}.portal-status{margin:0 22px 18px;padding:11px 13px;border-radius:7px;font-weight:800}.portal-status.ok{background:#e8f6ee;color:#147a4b}.portal-status.error{background:#fbebe9;color:#b13a2e}
  </style>
</head>
<body>
  <main class="portal-page">
    <section class="portal-card">
      <div class="portal-head">
        <img src="assets/brand/secure-smart-logo-header.webp" alt="Secure Smart" />
        <h1>Secure Smart Customer Login</h1>
        <p>Approved customers can sign in with the email and password set from the secure invite link.</p>
      </div>
      <form class="portal-form" data-customer-password-form hidden>
        <label class="portal-field">New password<span class="portal-password-wrap"><input name="new_password" type="password" autocomplete="new-password" minlength="8" required /><button class="portal-password-toggle" type="button" data-toggle-password>Show</button></span></label>
        <label class="portal-field">Confirm password<span class="portal-password-wrap"><input name="confirm_password" type="password" autocomplete="new-password" minlength="8" required /><button class="portal-password-toggle" type="button" data-toggle-password>Show</button></span></label>
        <button type="submit">Save password</button>
      </form>
      <form class="portal-form" data-customer-login-form>
        <label>Email<input name="email" type="email" autocomplete="email" required /></label>
        <label class="portal-field">Password<span class="portal-password-wrap"><input name="password" type="password" autocomplete="current-password" required /><button class="portal-password-toggle" type="button" data-toggle-password>Show</button></span></label>
        <button type="submit">Sign in to customer area</button>
      </form>
      <form class="portal-form" data-customer-reset-form hidden>
        <label>Email<input name="email" type="email" autocomplete="email" required /></label>
        <button type="submit">Send password reset email</button>
      </form>
      <p data-customer-login-status class="portal-status" style="display:block">If you just updated your password, sign in with the same email and the new password.</p>
      <div class="portal-actions">
        <a class="secondary" href="#" data-show-reset>Forgot password?</a>
        <a class="secondary" href="account.html">Apply for a Trade Account</a>
        <a class="secondary" href="catalog-template.html">Back to catalog</a>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/customer-config.js"></script>
  <script src="assets/customer-portal.js"></script>
</body>
</html>
